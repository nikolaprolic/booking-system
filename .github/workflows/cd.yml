name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make mvnw executable
        run: |
          chmod +x user-service/mvnw
          chmod +x resource-service/mvnw
          chmod +x booking-service/mvnw
          chmod +x notification-service/mvnw
          chmod +x api-gateway/mvnw

      - name: Build all services
        run: |
          cd user-service && ./mvnw clean package -DskipTests && cd ..
          cd resource-service && ./mvnw clean package -DskipTests && cd ..
          cd booking-service && ./mvnw clean package -DskipTests && cd ..
          cd notification-service && ./mvnw clean package -DskipTests && cd ..
          cd api-gateway && ./mvnw clean package -DskipTests && cd ..

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build -t booking/user-service:latest ./user-service
          docker build -t booking/resource-service:latest ./resource-service
          docker build -t booking/booking-service:latest ./booking-service
          docker build -t booking/notification-service:latest ./notification-service
          docker build -t booking/api-gateway:latest ./api-gateway

      - name: Deploy with Docker Compose
        run: |
          docker compose up -d --build
          echo "Deployment completed successfully!"

      - name: Post-deploy health check
        run: |
             echo "Deployment completed successfully!"
             echo "Services deployed:"
             echo "  - API Gateway: http://localhost:8080"
             echo "  - User Service: http://localhost:8081/actuator/health"
             echo "  - Resource Service: http://localhost:8082/actuator/health"
             echo "  - Booking Service: http://localhost:8083/actuator/health"
             echo "  - Notification Service: http://localhost:8084/actuator/health"