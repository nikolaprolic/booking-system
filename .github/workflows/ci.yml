name: CI Pipeline

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgre
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make mvnw executable
        run: |
          chmod +x user-service/mvnw
          chmod +x resource-service/mvnw
          chmod +x booking-service/mvnw
          chmod +x notification-service/mvnw
          chmod +x api-gateway/mvnw

      - name: Build user-service
        run: cd user-service && ./mvnw clean package -DskipTests

      - name: Build resource-service
        run: cd resource-service && ./mvnw clean package -DskipTests

      - name: Build booking-service
        run: cd booking-service && ./mvnw clean package -DskipTests

      - name: Build notification-service
        run: cd notification-service && ./mvnw clean package -DskipTests

      - name: Build api-gateway
        run: cd api-gateway && ./mvnw clean package -DskipTests

      - name: Build and tag Docker images
        run: |
              docker build -t booking/user-service:latest -t booking/user-service:${{ github.sha }} ./user-service
              docker build -t booking/resource-service:latest -t booking/resource-service:${{ github.sha }} ./resource-service
              docker build -t booking/booking-service:latest -t booking/booking-service:${{ github.sha }} ./booking-service
              docker build -t booking/notification-service:latest -t booking/notification-service:${{ github.sha }} ./notification-service
              docker build -t booking/api-gateway:latest -t booking/api-gateway:${{ github.sha }} ./api-gateway

      - name: SonarCloud analysis
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd user-service && ./mvnw sonar:sonar \
            -Dsonar.projectKey=nikolaprolic_booking-system \
            -Dsonar.organization=nikolaprolic \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=false && cd ..

      - name: Run E2E tests
        run: cd e2e-tests && mvn test

